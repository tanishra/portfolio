<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#080B12"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" stroke="#00D4FF" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- T letter — bold, display font feel -->
  <rect x="8" y="9" width="16" height="2.5" rx="1.25" fill="url(#grad)"/>
  <rect x="14" y="9" width="4" height="14" rx="1.5" fill="url(#grad)"/>
  <!-- Accent dot -->
  <circle cx="23" cy="23" r="2.5" fill="#00D4FF" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="8" y1="9" x2="24" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
</svg>
